name: Microservices CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, cartservice]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Визначаємо шлях до контексту Docker для кожного сервісу
          context: ${{ matrix.service == 'cartservice' ? './src/cartservice/src' : './src/frontend' }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest

      - name: Update Kustomize images
        run: |
          # Ми НЕ використовуємо 'cd'. Замість цього вказуємо шлях прямо в команді.
          # Це гарантує, що kubectl знайде kustomization.yaml
          
          echo "Updating Staging..."
          kubectl kustomize edit set image ${{ matrix.service }}=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest k8s/overlays/staging
          
          echo "Updating Production..."
          kubectl kustomize edit set image ${{ matrix.service }}=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest k8s/overlays/production

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update ${{ matrix.service }} image to latest" || exit 0
          git pull --rebase origin main
          git push
