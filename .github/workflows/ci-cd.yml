name: Microservices CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, cartservice]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Context
        id: docker_context
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            echo "path=./src/cartservice/src" >> $GITHUB_OUTPUT
          else
            echo "path=./src/frontend" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.docker_context.outputs.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest

- name: Update Kustomize images
        run: |
          # Визначаємо компоненти образу
          NEW_IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service }}"
          NEW_TAG="latest"
          
          echo "Updating images in Kustomize..."
          
          # Використовуємо формат name=newName:newTag
          # Лапки навколо всього виразу обов'язкові
          kustomize edit set image "${{ matrix.service }}=${NEW_IMAGE}:${NEW_TAG}" k8s/overlays/staging
          kustomize edit set image "${{ matrix.service }}=${NEW_IMAGE}:${NEW_TAG}" k8s/overlays/production

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update ${{ matrix.service }} image to latest" || exit 0
          git pull --rebase origin main
          git push
